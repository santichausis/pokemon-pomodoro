<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Top half (red) -->
  <circle cx="50" cy="50" r="50" fill="#EE1515"/>

  <!-- Bottom half (white) -->
  <ellipse cx="50" cy="50" rx="50" ry="50" fill="white" clip-path="polygon(0% 50%, 100% 50%, 100% 100%, 0% 100%)"/>

  <!-- Center band -->
  <rect x="0" y="45" width="100" height="10" fill="#222222"/>

  <!-- Center button -->
  <circle cx="50" cy="50" r="8" fill="white" stroke="#222222" stroke-width="1.5"/>

  <!-- Inner circle highlight -->
  <circle cx="50" cy="50" r="6" fill="#F0F0F0"/>
</svg>
