<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Pomodoro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">

        <header class="app-header">
            <div class="header-pokeball">
                <div class="hpb-top"></div>
                <div class="hpb-band"><div class="hpb-btn"></div></div>
                <div class="hpb-bottom"></div>
            </div>
            <h1 class="app-title">Pokémon<br><span>Pomodoro</span></h1>
            <div class="header-pokeball">
                <div class="hpb-top"></div>
                <div class="hpb-band"><div class="hpb-btn"></div></div>
                <div class="hpb-bottom"></div>
            </div>
        </header>

        <main class="app-main">

            <div class="goal-wrapper">
                <label class="goal-label" for="goal-input">¿Cuál es tu objetivo?</label>
                <input
                    type="text"
                    id="goal-input"
                    class="goal-input"
                    placeholder="Ej: Terminar el capítulo 3..."
                    maxlength="80"
                    autocomplete="off"
                >
            </div>

            <div class="timer-wrapper">
                <svg class="timer-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
                    <circle class="timer-track" cx="120" cy="120" r="104"/>
                    <circle class="timer-ring" id="timer-ring" cx="120" cy="120" r="104"
                            transform="rotate(-90 120 120)"/>
                </svg>
                <div class="timer-face">
                    <div class="timer-time" id="timer-time">25:00</div>
                    <div class="timer-status" id="timer-status">Listo</div>
                </div>
            </div>

            <div class="duration-row">
                <button class="dur-btn active" data-min="25">25 min</button>
                <button class="dur-btn" data-min="45">45 min</button>
                <button class="dur-btn" data-min="60">60 min</button>
                <button class="dur-btn" id="custom-btn">Custom</button>
            </div>
            <div class="custom-row hidden" id="custom-row">
                <input type="number" id="custom-input" class="custom-input" min="1" max="180" placeholder="minutos">
                <button class="dur-btn" id="custom-ok">OK</button>
            </div>

            <div class="controls-row">
                <button class="ctrl-btn secondary" id="reset-btn">↩ Reset</button>
                <button class="ctrl-btn primary" id="start-btn">▶ Iniciar</button>
            </div>

        </main>

        <section class="collection-section">
            <div class="collection-header">
                <h2 class="collection-title">Tu Pokédex</h2>
                <span class="collection-badge" id="collection-count">0</span>
            </div>
            <div class="pokemon-grid" id="pokemon-grid">
                <div class="empty-state">
                    <div class="empty-pokeball">
                        <div class="epb-top"></div>
                        <div class="epb-band"><div class="epb-btn"></div></div>
                        <div class="epb-bottom"></div>
                    </div>
                    <p>Completá tu primera sesión<br>para capturar tu primer Pokémon</p>
                </div>
            </div>
        </section>

    </div>

    <!-- Modal de captura -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <p class="modal-stars">✦ ✦ ✦</p>
                <h2 class="modal-title">¡Objetivo Cumplido!</h2>
                <p class="modal-goal-display" id="modal-goal-display"></p>
            </div>

            <div class="capture-stage" id="capture-stage">
                <div class="pokeball-anim" id="pokeball-anim">
                    <div class="pba-top"></div>
                    <div class="pba-band"><div class="pba-btn"></div></div>
                    <div class="pba-bottom"></div>
                </div>
            </div>

            <div class="pokemon-reveal hidden" id="pokemon-reveal">
                <div class="reveal-glow" id="reveal-glow"></div>
                <img class="pokemon-sprite" id="pokemon-sprite" src="" alt="">
                <span class="pokemon-number" id="pokemon-number">#000</span>
                <h3 class="pokemon-name" id="pokemon-name"></h3>
                <div class="pokemon-types" id="pokemon-types"></div>
                <div class="captured-banner">¡Capturado! ⭐</div>
            </div>

            <button class="ctrl-btn primary hidden" id="modal-continue">¡Continuar!</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
